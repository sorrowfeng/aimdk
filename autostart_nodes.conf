# 自定义 ROS2 节点开机自启配置
# 格式: package  executable  [wait_topic]
#
# wait_topic: 可选，启动前等待该 topic 出现（确保依赖服务已就绪）
# 如无需等待直接留空
#
# 示例:
#   py_examples  my_node
#   py_examples  my_node  /some/topic

# --- 常驻后台节点 ---
py_examples  rc_hand_sync         /aima/mc/common/state
py_examples  voice_command_ip     /aima/hal/audio/capture

